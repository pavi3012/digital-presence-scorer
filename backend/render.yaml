services:
  - type: web
    name: digital-presence-scorer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scorer-db
          property: connectionString
    python:
      version: 3.11  # ← Add this line