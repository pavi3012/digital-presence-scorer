services:
  - type: web
    name: digital-presence-scorer-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scorer-db
          property: connectionString

databases:
  - name: scorer-db
    plan: free